name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      SIGNING_ENABLED: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.P12_PASSWORD != '' && secrets.APPLE_API_PRIVATE_KEY_BASE64 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="$GITHUB_REF_NAME"
          else
            VERSION="${{ inputs.version }}"
            TAG="v$VERSION"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist

      - name: Import Developer ID certificate
        if: env.SIGNING_ENABLED == 'true'
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          chmod 600 "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          test -n "$SIGN_IDENTITY"
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Build DMG
        shell: bash
        run: |
          chmod +x build.sh scripts/create-dmg.sh
          scripts/create-dmg.sh "$VERSION"

      - name: Notarize and staple
        if: env.SIGNING_ENABLED == 'true'
        shell: bash
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"
          DMG="$(find build -maxdepth 1 -name '*.dmg' -print -quit)"
          echo -n "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Verify and checksum
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 "build/Claude Usage.app"
          shasum -a 256 build/*.dmg > build/SHA256SUMS.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/*.dmg build/SHA256SUMS.txt --clobber
          else
            RELEASE_ARGS=(--title "$TAG" --target "$GITHUB_SHA")
            if [[ "$SIGNING_ENABLED" == "true" ]]; then
              RELEASE_ARGS+=(--generate-notes)
            else
              RELEASE_ARGS+=(--prerelease --notes "Unsigned testing build. macOS Gatekeeper will warn because this DMG has not been signed with an Apple Developer ID or notarized.")
            fi
            gh release create "$TAG" build/*.dmg build/SHA256SUMS.txt \
              "${RELEASE_ARGS[@]}"
          fi
